name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'  # Déclenché sur les tags version (v1.0.0, v1.2.3, etc.)

permissions:
  contents: write  # Nécessaire pour créer des releases

jobs:
  verify-version:
    name: Verify version matches
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      tag_version: ${{ steps.get_version.outputs.tag_version }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Get versions
        id: get_version
        run: |
          # Extraire la version du tag (enlever le 'v')
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          echo "tag_version=$TAG_VERSION" >> $GITHUB_OUTPUT
          
          # Extraire la version de pyproject.toml
          PYPROJECT_VERSION=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          echo "version=$PYPROJECT_VERSION" >> $GITHUB_OUTPUT
          
          echo "Tag version: $TAG_VERSION"
          echo "pyproject.toml version: $PYPROJECT_VERSION"
          
          # Vérifier qu'elles correspondent
          if [ "$TAG_VERSION" != "$PYPROJECT_VERSION" ]; then
            echo "❌ ERREUR: La version du tag ($TAG_VERSION) ne correspond pas à pyproject.toml ($PYPROJECT_VERSION)"
            exit 1
          fi
          
          echo "✅ Versions correspondent: $TAG_VERSION"

  build-windows:
    name: Build Windows executable
    needs: verify-version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      
      - name: Set up Python
        run: uv python install 3.12
      
      - name: Install dependencies
        run: uv sync --group dev
      
      - name: Build with PyInstaller
        run: uv run pyinstaller build.spec --clean
      
      - name: Verify executable exists
        run: |
          if (!(Test-Path "dist\OxyZen.exe")) {
            Write-Host "❌ ERREUR: dist\OxyZen.exe n'a pas été créé"
            exit 1
          }
          $size = (Get-Item "dist\OxyZen.exe").Length / 1MB
          Write-Host "✅ Exécutable créé: dist\OxyZen.exe ($([math]::Round($size, 2)) MB)"
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OxyZen-Windows-v${{ needs.verify-version.outputs.version }}
          path: dist/OxyZen.exe
          retention-days: 90

  create-release:
    name: Create GitHub Release
    needs: [verify-version, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: OxyZen-Windows-v${{ needs.verify-version.outputs.version }}
          path: dist/
      
      - name: Generate changelog
        id: changelog
        run: |
          # Générer un changelog basique depuis les commits
          if git describe --tags --abbrev=0 HEAD^ 2>/dev/null; then
            PREV_TAG=$(git describe --tags --abbrev=0 HEAD^)
            CHANGELOG=$(git log $PREV_TAG..HEAD --pretty=format:"- %s" --no-merges)
          else
            CHANGELOG="Première release 🎉"
          fi
          
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Oxy-Zen v${{ needs.verify-version.outputs.version }}
          body: |
            # 🧘 Oxy-Zen v${{ needs.verify-version.outputs.version }}
            
            Application de rappels d'exercices adaptatifs pour Windows.
            
            ## 📥 Installation
            
            1. Télécharge `OxyZen.exe` ci-dessous
            2. Lance l'exécutable (aucune installation requise)
            3. [Optionnel] Copie dans `shell:startup` pour le démarrage automatique
            
            ## ✨ Nouveautés
            
            ${{ steps.changelog.outputs.changelog }}
            
            ## 📋 Notes
            
            - **Plateforme** : Windows 10/11 uniquement
            - **Taille** : ~18 MB
            - **Prérequis** : Aucun (Python non nécessaire)
            
            ---
            
            💪 Prends soin de toi !
          files: |
            dist/OxyZen.exe
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
